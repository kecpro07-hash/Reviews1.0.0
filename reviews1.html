<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отзывы - У Нас Чисто</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .stats {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            display: flex;
            justify-content: space-around;
            backdrop-filter: blur(10px);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .review-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .user-id {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .review-date {
            color: #999;
            font-size: 13px;
        }
        
        .review-text {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 15px;
        }
        
        .rating {
            display: flex;
            gap: 5px;
        }
        
        .star {
            color: #FFD700;
            font-size: 20px;
        }
        
        .star.inactive {
            color: #ddd;
        }
        
        .no-reviews {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            color: #999;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .back-button {
            display: block;
            width: 100%;
            padding: 15px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        .back-button:hover {
            background: #f8f9fa;
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⭐ Отзывы</h1>
            <p>Что говорят наши клиенты</p>
        </div>
        
        <div id="reviews-container">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Загрузка отзывов...</p>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        function renderRating(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    stars += '<span class="star">★</span>';
                } else {
                    stars += '<span class="star inactive">☆</span>';
                }
            }
            return stars;
        }

        async function loadReviews() {
            try {
                // ТЕСТОВЫЕ ДАННЫЕ (замените на реальные позже)
                const reviews = [
                    {
                        short_id: "ABC1",
                        text: "Отличный сервис! Быстро, качественно, вежливый курьер.",
                        rating: 5,
                        date: "15.03.2024"
                    },
                    {
                        short_id: "XYZ2",
                        text: "Очень удобно, что можно заказать вынос мусора не выходя из дома.",
                        rating: 5,
                        date: "14.03.2024"
                    },
                    {
                        short_id: "DEF3",
                        text: "Всё супер! Приехали вовремя, пакеты забрали. Спасибо!",
                        rating: 5,
                        date: "13.03.2024"
                    }
                ];
                
                displayReviews(reviews);
            } catch (error) {
                document.getElementById('reviews-container').innerHTML = `
                    <div class="no-reviews">
                        <p>Ошибка загрузки отзывов</p>
                    </div>
                `;
            }
        }

        function displayReviews(reviews) {
            const container = document.getElementById('reviews-container');
            
            if (!reviews || reviews.length === 0) {
                container.innerHTML = `
                    <div class="no-reviews">
                        <p>Пока нет отзывов</p>
                    </div>
                `;
                return;
            }

            const avgRating = (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1);
            
            let reviewsHtml = `
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value">${reviews.length}</div>
                        <div class="stat-label">отзывов</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${avgRating}</div>
                        <div class="stat-label">рейтинг</div>
                    </div>
                </div>
                
                <div class="reviews-list">
            `;

            reviews.forEach(review => {
                reviewsHtml += `
                    <div class="review-card">
                        <div class="review-header">
                            <span class="user-id">🆔 ${review.short_id}</span>
                            <span class="review-date">${review.date}</span>
                        </div>
                        <div class="review-text">${review.text}</div>
                        <div class="rating">
                            ${renderRating(review.rating)}
                        </div>
                    </div>
                `;
            });

            reviewsHtml += `</div>`;
            
            if (tg) {
                reviewsHtml += `
                    <button class="back-button" onclick="tg.close()">
                        Закрыть
                    </button>
                `;
            }

            container.innerHTML = reviewsHtml;
        }

        loadReviews();
    </script>
</body>
</html>
