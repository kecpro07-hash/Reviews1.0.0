<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отзывы - У Нас Чисто</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .stats {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            display: flex;
            justify-content: space-around;
        }
        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .review-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        .order-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        .review-date {
            color: #999;
            font-size: 13px;
        }
        .review-text {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 15px;
        }
        .rating {
            display: flex;
            gap: 5px;
        }
        .star {
            color: #FFD700;
            font-size: 20px;
        }
        .star.inactive {
            color: #ddd;
        }
        .loading {
            text-align: center;
            color: white;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⭐ Отзывы наших клиентов</h1>
            <p>У Нас Чисто - сервис выноса мусора</p>
        </div>
        <div id="reviews-container">
            <div class="loading">Загрузка отзывов...</div>
        </div>
    </div>

    <script>
        async function loadReviews() {
            try {
                const response = await fetch('reviews.json?t=' + Date.now());
                const data = await response.json();
                
                let html = '';
                
                if (data.reviews && data.reviews.length > 0) {
                    // Статистика
                    html += `
                        <div class="stats">
                            <div class="stat-item">
                                <div class="stat-value">${data.stats.total}</div>
                                <div class="stat-label">всего отзывов</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${data.stats.average}</div>
                                <div class="stat-label">средний рейтинг</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${data.stats.five_stars}</div>
                                <div class="stat-label">оценок 5⭐</div>
                            </div>
                        </div>
                        <div class="reviews-list">
                    `;
                    
                    data.reviews.forEach(review => {
                        let stars = '';
                        for (let i = 1; i <= 5; i++) {
                            stars += i <= review.rating ? '<span class="star">★</span>' : '<span class="star inactive">☆</span>';
                        }
                        
                        const orderDisplay = review.order_number !== "GENERAL" ? `Заказ ${review.order_number}` : 'Отзыв';
                        
                        html += `
                            <div class="review-card">
                                <div class="review-header">
                                    <span class="order-number">${orderDisplay}</span>
                                    <span class="review-date">${review.date}</span>
                                </div>
                                <div class="review-text">${review.text || 'Без текстового отзыва'}</div>
                                <div class="rating">${stars}</div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                } else {
                    html = '<div class="loading">Пока нет отзывов</div>';
                }
                
                document.getElementById('reviews-container').innerHTML = html;
            } catch (error) {
                document.getElementById('reviews-container').innerHTML = '<div class="loading">Ошибка загрузки отзывов</div>';
            }
        }
        
        loadReviews();
        setInterval(loadReviews, 30000);
    </script>
</body>
</html>
